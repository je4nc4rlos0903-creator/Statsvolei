<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scout Vôlei</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}

button{
padding:8px;
margin:4px;
border:none;
border-radius:8px;
cursor:pointer;
}

.card{
background:#1e293b;
margin:5px;
padding:10px;
border-radius:10px;
}

#court{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:8px;
padding:10px;
}

#overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.8);
display:none;
align-items:center;
justify-content:center;
}

#popup{
background:#1e293b;
padding:15px;
border-radius:10px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:8px;
max-width:90%;
}

.lista{
background:#1e293b;
padding:10px;
border-radius:10px;
cursor:pointer;
margin:5px;
}

.erro{background:#dc2626;color:white;}
.acerto{background:#16a34a;color:white;}

.top{
display:flex;
justify-content:space-around;
padding:10px;
}
</style>
</head>

<body>

<div id="menu">
<h2>🏐 Scout Vôlei</h2>
<button onclick="novoJogo()">JOGO</button>
<button onclick="abrirJogos()">MEUS JOGOS</button>
</div>

<div id="app" style="display:none;">
<h3 id="nomeJogo"></h3>

<div class="top">
<div>🏆 <span id="scoreA">0</span></div>
<div>VS</div>
<div>🏆 <span id="scoreB">0</span></div>
</div>

<div id="court"></div>

<button onclick="rodar()">🔄 Rodar</button>
<button onclick="finalizar()">Finalizar</button>
</div>

<div id="listaJogos" style="display:none;"></div>

<div id="overlay">
<div id="popup"></div>
</div>

<script>
let jogo=null;

/* ================= CRIAR JOGO ================= */
function novoJogo(){
let nome=prompt("Nome da partida:");
if(!nome)return;

jogo={
nome,
scoreA:0,
scoreB:0,
setA:0,
setB:0,
sets:[],
players:mockPlayers()
};

menu.style.display="none";
app.style.display="block";

nomeJogo.innerText=nome;
render();
}

/* ================= PLAYERS ================= */
function mockPlayers(){
return [
{nome:"P1",pos:"Lev",posQuadra:1,ac:{},er:{}},
{nome:"P2",pos:"Pon",posQuadra:2,ac:{},er:{}},
{nome:"P3",pos:"Cen",posQuadra:3,ac:{},er:{}},
{nome:"P4",pos:"Opo",posQuadra:4,ac:{},er:{}},
{nome:"P5",pos:"Lib",posQuadra:5,ac:{},er:{}},
{nome:"P6",pos:"Cen",posQuadra:6,ac:{},er:{}}
];
}

/* ================= RENDER ================= */
function render(){
let court=document.getElementById("court");
court.innerHTML="";

for(let i=1;i<=6;i++){
let p=jogo.players.find(x=>x.posQuadra==i);

court.innerHTML+=`
<div class="card">
${p?`
<b>${p.nome}</b><br>
<small>${p.pos}</small><br>

<button class="acerto" onclick="acerto()">Acerto</button>
<button class="erro" onclick="erroMenu(${i})">Erro</button>
`:`<button onclick="colocar(${i})">+ Jogador</button>`}
</div>`;
}

scoreA.innerText=jogo.scoreA;
scoreB.innerText=jogo.scoreB;
}

/* ================= POSIÇÃO ================= */
function colocar(pos){
overlay.style.display="flex";

popup.innerHTML=jogo.players.map((p,i)=>`
<div class="lista" onclick="setPos(${i},${pos})">
${p.nome}<br>${p.pos}
</div>
`).join("");
}

function setPos(i,pos){
jogo.players[i].posQuadra=pos;
overlay.style.display="none";
render();
}

/* ================= ERRO MENU ================= */
function erroMenu(pos){
overlay.style.display="flex";

popup.innerHTML=["saque","recepcao","defesa","levantamento","ataque","bloqueio"]
.map(f=>`
<button onclick="erroTipo(${pos},'${f}')">${f}</button>
`).join("");
}

/* ================= ERRO NORMAL/FATAL ================= */
function erroTipo(pos,f){
overlay.style.display="flex";

popup.innerHTML=`
<button onclick="erroNormal(${pos},'${f}')">❌ Erro</button>
<button onclick="erroFatal(${pos},'${f}')">💥 Fatal</button>
`;
}

function erroNormal(pos,f){
let p=jogo.players.find(x=>x.posQuadra==pos);
if(!p.er) p.er={};
p.er[f]=(p.er[f]||0)+1;

overlay.style.display="none";
render();
}

function erroFatal(pos,f){
let p=jogo.players.find(x=>x.posQuadra==pos);
if(!p.er) p.er={};
p.er[f]=(p.er[f]||0)+1;

jogo.scoreB++;
setCheck();

overlay.style.display="none";
render();
}

/* ================= ACERTO ================= */
function acerto(){
jogo.scoreA++;
setCheck();
render();
}

/* ================= SET ================= */
function setCheck(){
if((jogo.scoreA>=25||jogo.scoreB>=25)&&Math.abs(jogo.scoreA-jogo.scoreB)>=2){
jogo.sets.push({a:jogo.scoreA,b:jogo.scoreB});

if(jogo.scoreA>jogo.scoreB)jogo.setA++;
else jogo.setB++;

jogo.scoreA=0;
jogo.scoreB=0;
}
}

/* ================= RODIZIO ================= */
function rodar(){
jogo.players.forEach(p=>{
if(p.posQuadra>0)
p.posQuadra=p.posQuadra==1?6:p.posQuadra-1;
});
render();
}

/* ================= SALVAR ================= */
function finalizar(){
let jogos=JSON.parse(localStorage.getItem("jogos")||"[]");
jogos.push(jogo);
localStorage.setItem("jogos",JSON.stringify(jogos));

abrirJogos();
}

/* ================= MEUS JOGOS ================= */
function abrirJogos(){
menu.style.display="none";
app.style.display="none";
listaJogos.style.display="block";

let jogos=JSON.parse(localStorage.getItem("jogos")||"[]");

listaJogos.innerHTML=`
<button onclick="voltar()">Voltar</button>
`+jogos.map(j=>`
<div class="lista">
${j.nome} (${j.setA}x${j.setB})
</div>
`).join("");
}

/* ================= VOLTAR ================= */
function voltar(){
location.reload();
}
</script>

</body>
</html>
